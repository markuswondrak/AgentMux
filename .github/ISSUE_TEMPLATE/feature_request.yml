name: Feature Request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap this would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should agentmux do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you're using today.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Workflow / state machine
        - Configuration
        - Init wizard
        - Resume
        - Providers / MCP
        - Monitor / UI
        - CLI / completions
        - Other

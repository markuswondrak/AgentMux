version: 2

defaults:
  session_name: agentmux
  provider: copilot
  max_review_iterations: 3

providers:
  copilot:
    model_args:
      claude-opus-4.6:
        - --reasoning-effort
        - high

roles:
  coder:
    model: gpt-5.4
  web-researcher:
    model: gpt-5.2
  code-researcher:
    model: gpt-5.2

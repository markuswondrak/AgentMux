version: 2

defaults:
  session_name: agentmux
  provider: copilot
  max_review_iterations: 3

providers:
  copilot:
    model_args:
      claude-opus-4.6:
        - --reasoning-effort
        - high

roles:
  planner:
    provider: cursor
    model: gemini-3-flash
  coder:
    provider: cursor
    model: auto
  web-researcher:
    model: gpt-5.2
  code-researcher:
    model: gpt-5.2
